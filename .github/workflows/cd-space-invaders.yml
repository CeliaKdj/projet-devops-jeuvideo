name: Deploy Space Invaders

on:
  workflow_run:
    workflows: ["Space Invaders"]
    branches: ["main"]
    types:
      - completed

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    # déploie uniquement si le CI a réussi
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # recuperation du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # installation Node.js 20
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: games/Space-Invaders/package-lock.json

      # installation des dépendances
      - name: Install dependencies
        working-directory: games/Space-Invaders
        run: npm install

      # compilation du projet
      - name: Build
        working-directory: games/Space-Invaders
        run: npm run build

      # préparation des fichiers pour GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # envoi des fichiers buildés
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: games/Space-Invaders/build

      # déploiement sur GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
