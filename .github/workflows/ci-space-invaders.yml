name: Space Invaders

on:
  push:
    branches: ["main", "develop", "feat/space-invaders"]
  pull_request:
    branches: ["main", "develop", "feat/space-invaders"]
  workflow_dispatch:

jobs:
  code-quality-and-tests:
    name: Code Quality and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: games/Space-Invaders/package-lock.json

      - name: Install dependencies
        working-directory: games/Space-Invaders
        run: npm install

      - name: Run lint
        working-directory: games/Space-Invaders
        run: npm run lint

      - name: Security audit
        working-directory: games/Space-Invaders
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run all tests (Jest)
        working-directory: games/Space-Invaders
        run: |
          if ! npx jest --reporters=default --reporters=github-actions; then
            echo "TESTS_FAILED=true" >> $GITHUB_ENV
            exit 1
          fi

  build-and-dockerization:
    name: Build and Dockerization
    runs-on: ubuntu-latest
    needs: code-quality-and-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: games/Space-Invaders/package-lock.json

      - name: Install dependencies
        working-directory: games/Space-Invaders
        run: npm install

      - name: Build
        working-directory: games/Space-Invaders
        run: npm run build

      - name: Build Docker image
        run: docker build -t space-invaders:${{ github.sha }} games/Space-Invaders

  reporting-and-notifications:
    name: Reporting and Notifications
    runs-on: ubuntu-latest
    needs: [code-quality-and-tests, build-and-dockerization]
    if: failure()
    steps:
      - name: Send Discord Notification on Failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          content: "**Échec de la CI** : Une erreur a été détectée sur Space Invaders."
          title: "Rapport de Pipeline"
          color: 0xff0000
