name: CI Two-ships

on:
  push:
    branches: ["main", "develop", "feat/two-ships"]
    paths:
      - 'games/Two-Ships-ITN/**'
  pull_request:
    branches: ["main", "develop", "feat/two-ships"]
    paths:
      - 'games/Two-Ships-ITN/**'
  # pour le lancement manuel:
  workflow_dispatch:

jobs:
  test-two-ships:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: games/Two-Ships-ITN/package-lock.json

      - name: Install dependencies
        working-directory: games/Two-Ships-ITN
        run: npm install

      - name: Run Linter (Google Style)
        working-directory: games/Two-Ships-ITN
        run: npx eslint . --ext .js --format stylish || echo "LINT_FAILED=true" >> $GITHUB_ENV

      - name: Security audit
        working-directory: games/Two-Ships-ITN
        run: npm audit --audit-level=critical || echo "AUDIT_FAILED=true" >> $GITHUB_ENV

      - name: Run all tests
        working-directory: games/Two-Ships-ITN
        run: |
          if ! npx mocha --reporter mocha-github-actions-reporter; then
            echo "TESTS_FAILED=true" >> $GITHUB_ENV
            exit 1
          fi

      - name: Build project
        working-directory: games/Two-Ships-ITN
        run: npm run build

      - name: Build Docker Image
        working-directory: games/Two-Ships-ITN
        run: docker build -t two-ships-itn:${{ github.sha }} . || echo "DOCKER_FAILED=true" >> $GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-dist
          path: games/Two-Ships-ITN/dist/

      - name: Generate Summary
        if: always()
        run: |
          echo "### Resume de l'analyse" >> $GITHUB_STEP_SUMMARY
          echo "| Etape | Etat |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Linting (Style Google) | ${{ env.LINT_FAILED == 'true' && 'Erreurs detectees' || 'Conforme' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Securite (Audit) | ${{ env.AUDIT_FAILED == 'true' && 'Failles critiques trouvees' || 'Securise' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests unitaires | ${{ env.TESTS_FAILED == 'true' && 'Echec' || 'Succes' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ env.DOCKER_FAILED == 'true' && 'Echec' || 'Succes' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Send Discord Notification on Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: "❌ **Échec de la CI** : Une erreur a été détectée sur le jeu Two-Ships."
          title: "Rapport de Pipeline"
          color: 0xff0000